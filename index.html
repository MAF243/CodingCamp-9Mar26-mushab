<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <main class="dashboard-grid">

        <!-- Header Card: clock, date, greeting, user name, theme toggle -->
        <header class="card card--header">
            <div class="clock-section">
                <span id="clock" aria-live="polite" aria-label="Current time">00:00:00</span>
                <span id="date" aria-live="polite" aria-label="Current date"></span>
            </div>
            <p id="greeting" aria-live="polite"></p>
            <div class="header-controls">
                <label for="user-name" class="sr-only">Your name</label>
                <input type="text" id="user-name" placeholder="Enter your name" autocomplete="off" />
                <button id="theme-toggle" aria-label="Toggle light/dark theme">🌙</button>
            </div>
        </header>

        <!-- Focus Timer Card -->
        <section class="card card--timer" aria-labelledby="timer-heading">
            <h2 id="timer-heading">Focus Timer</h2>
            <div id="timer" class="timer-display" aria-live="polite" aria-label="Timer countdown">25:00</div>
            <div class="timer-controls">
                <button id="timer-start">Start</button>
                <button id="timer-stop">Stop</button>
                <button id="timer-reset">Reset</button>
            </div>
        </section>

        <!-- To-Do List Card -->
        <section class="card card--tasks" aria-labelledby="tasks-heading">
            <h2 id="tasks-heading">To-Do List</h2>
            <form id="task-form" novalidate>
                <label for="task-input" class="sr-only">New task</label>
                <input type="text" id="task-input" placeholder="Add a new task…" autocomplete="off" required />
                <button type="submit">Add</button>
            </form>
            <ul id="task-list" aria-label="Task list"></ul>
        </section>

        <!-- Quick Links Card -->
        <section class="card card--links" aria-labelledby="links-heading">
            <h2 id="links-heading">Quick Links</h2>
            <form id="link-form" novalidate>
                <label for="link-name" class="sr-only">Link name</label>
                <input type="text" id="link-name" placeholder="Name" autocomplete="off" required />
                <label for="link-url" class="sr-only">Link URL</label>
                <input type="url" id="link-url" placeholder="URL" autocomplete="off" required />
                <button type="submit">Add</button>
            </form>
            <div id="link-panel" aria-label="Quick links panel"></div>
        </section>

    </main>

    <script src="js/script.js"></script>
</body>

</html>
